<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finansal Bilgelik OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Finansal Bilgelik OS</h1>
        <p class="subtitle">Bileşik Faiz Simülatörü</p>
        
        <div class="card">
            <div class="input-group">
                <label>Ana Para (₺)</label>
                <input type="number" id="principal" value="1000">
            </div>
            <div class="input-group">
                <label>Yıllık Faiz Oranı (Örn: 0.10)</label>
                <input type="number" id="rate" step="0.01" value="0.10">
            </div>
            <div class="input-group">
                <label>Yıl Sayısı</label>
                <input type="number" id="years" value="5">
            </div>
            <button id="calculateBtn">Hesapla</button>
        </div>

        <div id="resultCard" class="card result hidden">
            <h3>Sonuç:</h3>
            <p id="finalAmount">₺0.00</p>
            <small id="note"></small>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
