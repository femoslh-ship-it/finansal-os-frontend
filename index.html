<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Finansal Bilgelik OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Finansal Bilgelik OS</h1>
            <p class="subtitle">Taleb & Dalio Onaylı Strateji Motoru</p>
            
            <div class="input-group">
                <label>Ana Para (₺)</label>
                <input type="number" id="principal" value="100000">
                <label>Yıllık Faiz Oranı (Örn: 0.45)</label>
                <input type="number" id="rate" step="0.01" value="0.45">
                <label>Vade (Yıl)</label>
                <input type="number" id="years" value="10">
                <button id="calculateBtn">Sistemi Çalıştır</button>
            </div>

            <div id="resultCard" class="hidden result-box">
                <div class="res-item"><span>Nominal Sonuç:</span> <b id="finalAmount"></b></div>
                <div class="res-item"><span>Reel Alım Gücü:</span> <b id="realValue"></b></div>
                <div class="res-item"><span>RPI Endeksi:</span> <b id="rpiValue"></b></div>
                <p id="note" class="info-note"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
